<!doctype html>
<html lang="en">
   
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="author" content="Hannah Ayers">
        <title>Dogs</title>
        <link rel="stylesheet" href="../../css/styles.css">
 </head>

<body>

    <header>
        <div class="logotitle">
            <div class="logo">
                <a href="../../index.html"><img src="../../images/sitelogo.png" alt="website logo" height="100"></a>
            </div>

            <div class="headerinfo">
                <h1>Nature Video Library</h1>
            </div>
        </div>

        <div class="navigation">
            <a href="../../../index.html">INF 6420 Projects</a> &emsp; &emsp; &emsp;
            <a href="../../index.html">Nature Video Home</a>
        </div>
    </header>

    <main>
        <div class="videoviewer">
            <div class="video">
                <video controls autoplay poster="video-4-frame1.jpg" muted>
                    <source src="video-4.mp4" type="video/mp4">
                    <track kind="captions" src="video-4.vtt" srclang="en" label="English">

                    Your broswer does not support the video tag.
                </video>
            </div>

            <div class="videoinfo">
                <h2>Dogs</h2>
                <p>Fun Fact: Dogs can only sweat through their paws. This is why they rely so heavily on panting to cool off.</p>
        </div>
    </main>

    <form>
        <h2>Comments</h2>

        <div class="name">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
        </div>

        <div class="message">
            <label for="comment-box"></label>
            <textarea id="comment-box" name="user_comments" rows="5" placeholder="Leave your comments here!"></textarea>
        </div>

        <div class="form-actions">
            <button type="submit">Submit Comment</button>
        </div>
    </form>

    <div class="comments">
        <div class="commentbox">
            <div class="profile">
                <img src="../../images/avatar-1.svg" alt="user icon" width="75">
            </div>

            <div class="commenttext">
                <h3>snoopdog</h3>
                <p>get!! him!! a!! doghouse!!</p>
            </div>
        </div>

        <div class="commentbox">
            <div class="profile">
                <img src="../../images/avatar-2.svg" alt="user icon" width="75">
            </div>

            <div class="commenttext">
                <h3>pluto</h3>
                <p>woof woof!</p>
            </div>
        </div>

        <div class="commentbox">
            <div class="profile">
                <img src="../../images/avatar-4.svg" alt="user icon" width="75">
            </div>

            <div class="commenttext">
                <h3>scoobysnacks4life</h3>
                <p>Ruh roh</p>
            </div>
        </div>
    </div>

    <footer>
        &copy;2026 | Hannah Ayers
